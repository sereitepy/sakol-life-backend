# SERVER
server.port=${PORT:8080}
# DATABASE - Supabase PostgreSQL
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# SUPABASE JWT VALIDATION
supabase.project.ref=${SUPABASE_PROJECT_REF}
# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
# LOGGING
logging.level.com.sakollife=DEBUG
logging.level.org.springframework.security=DEBUG

# Digital Ocean Spaces
do.spaces.endpoint=${DO_SPACES_ENDPOINT:https://sgp1.digitaloceanspaces.com}
do.spaces.bucket=${DO_SPACES_BUCKET:sakollife-media}
do.spaces.access-key=${DO_SPACES_ACCESS_KEY}
do.spaces.secret-key=${DO_SPACES_SECRET_KEY}
do.spaces.cdn-base-url=${DO_SPACES_CDN_BASE_URL:https://sakollife-media.sgp1.cdn.digitaloceanspaces.com}

# Supabase JWT
supabase.jwt.public-key.x=${SUPABASE_JWT_KEY_X}
supabase.jwt.public-key.y=${SUPABASE_JWT_KEY_Y}
supabase.jwt.key-id=${SUPABASE_JWT_KEY_ID}
supabase.jwt.issuer=${SUPABASE_JWT_ISSUER}